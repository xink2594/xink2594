name: Generate Space Shooter Game
on:
  schedule:
    # 每天运行一次
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # 必须配置，以便正常提交更新

      - name: GitHub Space Shooter
        uses: czl9707/gh-space-shooter@v2.0.2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # 如果需要修改，可以添加参数，例如：
          # strategy: random 
          # fps: 40

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add gh-space-shooter.gif
          git commit -m "Update space shooter game GIF" || echo "No changes to commit"
          git push
